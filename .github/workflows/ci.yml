name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        # Tests that need the corpus cache skip themselves cleanly when
        # .corpus-cache/ isn't present, so this runs without API keys
        # or the ~9MB of PDFs the eval suite would need.
        run: bun test

  # Note: a "full eval" job that runs `bun run corpus:fetch` +
  # `bun run corpus:chunk` + `bun run eval` is intentionally NOT in CI.
  # The full eval calls Anthropic with real API keys (cost: ~$0.32 per
  # run). It's runnable locally and on a manual workflow_dispatch trigger
  # if/when budget allows; default CI sticks to free, deterministic
  # checks so PRs don't accrue inference costs.
